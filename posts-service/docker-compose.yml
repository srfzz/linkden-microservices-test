services:
  db:
    image: postgres:15-alpine
    container_name: linkdin_post_service
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789@@
      POSTGRES_DB: linkden_posts_db
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data: